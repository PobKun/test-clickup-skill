<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo — Test ClickUp Skill</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 20px; }
    form { display: flex; gap: 8px; margin-bottom: 16px; }
    input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 12px; border: 0; border-radius: 6px; background: #4f46e5; color: #fff; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; }
    .del { background: #ef4444; }
  </style>
</head>
<body>
  <h1>Todos</h1>
  <form id="form">
    <input id="text" placeholder="What needs doing?" autocomplete="off" />
    <button type="submit">Add</button>
  </form>
  <ul id="list"></ul>

  <script>
    const API = 'http://localhost:3000';
    const list = document.getElementById('list');
    const form = document.getElementById('form');
    const input = document.getElementById('text');

    async function load() {
      const todos = await fetch(`${API}/todos`).then((r) => r.json());
      list.innerHTML = '';
      for (const t of todos) {
        const li = document.createElement('li');
        li.textContent = t.text;
        const btn = document.createElement('button');
        btn.textContent = 'Delete';
        btn.className = 'del';
        btn.onclick = () => del(t.id);
        li.appendChild(btn);
        list.appendChild(li);
      }
    }

    async function del(id) {
      await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
      load();
    }

    form.onsubmit = async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      await fetch(`${API}/todos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      input.value = '';
      load();
    };

    load();
  </script>
</body>
</html>
